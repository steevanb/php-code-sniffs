name: CI Docker
on:
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            packages: write
        steps:
            - uses: actions/checkout@v6
            -
                name: Login to GHCR
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -
                name: bin/ci/docker --push
                run: bin/ci/docker --push
