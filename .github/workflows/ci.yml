name: CI
on: [push]

jobs:
    phpcs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            -
                name: bin/composer update
                run: bin/composer update
            -
                name: bin/ci/phpcs
                run: bin/ci/phpcs
            -
                name: bin/ci/phpunit
                run: bin/ci/phpunit
