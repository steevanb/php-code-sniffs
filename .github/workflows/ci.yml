name: CI
on: [push]

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            -
                name: Cache vendor
                uses: actions/cache@v5
                with:
                    path: vendor
                    key: vendor-${{ hashFiles('composer.json') }}
            -
                name: bin/ci/env
                run: bin/ci/env
            -
                name: bin/ci/validate
                run: bin/ci/validate --theme=summary -v
